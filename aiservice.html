<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant - Хавфсиз Тўлов Тизими</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.1.1/docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #2196f3; --red: #ff4d4d; --green: #00e676; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid var(--blue); box-shadow: 0 0 20px rgba(33,150,243,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #log { margin: 15px 0; font-weight: bold; padding: 10px; border-radius: 10px; display: none; }
        .error-log { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid var(--red); }
        .success-log { background: rgba(0, 230, 118, 0.1); color: var(--green); border: 1px solid var(--green); }
        .hidden { display: none; }
        .result-view { text-align: left; background: #000; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color: var(--blue);">🤖 AI Assistant</h2>
        <p id="subTitle">Хизматдан фойдаланиш учун маълумотларни киритинг</p>

        <!-- 1. МАЪЛУМОТ КИРИТИШ -->
        <div id="dataSection">
            <select id="mode" onchange="updateUI()">
                <option value="audio">🎙 Аудиони матнга айлантириш</option>
                <option value="text">📝 Матнни 3 тилга таржима қилиш</option>
            </select>
            <input type="file" id="audioFile" accept="audio/*">
            <textarea id="textMsg" class="hidden" placeholder="Таржима учун матнни ёзинг..."></textarea>
            <button class="btn" onclick="openPayment()">ТЎЛОВГА ЎТИШ</button>
        </div>

        <!-- 2. БАНК ТЎЛОВИ (ҚАТЪИЙ НАЗОРАТ) -->
        <div id="paySection" class="hidden">
            <h3 style="color: #ff9100;">💳 Банк Картаси орқали тўлов</h3>
            <p style="font-size: 13px; color: #888;">Сумма: 500 000 сўм</p>
            
            <input type="text" id="cNum" placeholder="Карта рақами (8600...)" maxlength="19">
            <input type="text" id="cExp" placeholder="Муддати (ММ/ЙЙ)" maxlength="5">
            
            <div id="log"></div>
            
            <button id="mainBtn" class="btn" style="background: var(--green);" onclick="validateAndPay()">✅ ТЎЛОВНИ ТАСДИҚЛАШ</button>
        </div>

        <!-- 3. НАТИЖА -->
        <div id="resSection" class="hidden">
            <div class="result-view">
                <b style="color: var(--blue);">🇺🇿 UZ:</b> <div id="uz"></div><br>
                <b style="color: var(--blue);">🇷🇺 RU:</b> <div id="ru"></div><br>
                <b style="color: var(--blue);">🇺🇸 EN:</b> <div id="en"></div>
            </div>
            <button class="btn" style="margin-top:10px; background: #ff9100;" onclick="exportDoc()">💾 WORD (.DOCX)</button>
            <button class="btn" style="margin-top:10px; background: #e74c3c;" onclick="exportPDF()">📄 PDF</button>
        </div>
    </div>

<script>
    let finalContent = { uz: "", ru: "", en: "" };

    // Карта рақами учун формат (пробеллар билан)
    document.getElementById('cNum').addEventListener('input', e => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    function updateUI() {
        const mode = document.getElementById('mode').value;
        document.getElementById('audioFile').classList.toggle('hidden', mode !== 'audio');
        document.getElementById('textMsg').classList.toggle('hidden', mode !== 'text');
    }

    function openPayment() {
        document.getElementById('dataSection').classList.add('hidden');
        document.getElementById('paySection').classList.remove('hidden');
        document.getElementById('subTitle').innerText = "Тўловни амалга оширинг";
    }

    // ҚАТЪИЙ ТЎЛОВ ТЕКШИРУВИ
    function validateAndPay() {
        const card = document.getElementById('cNum').value.replace(/\s/g, '');
        const exp = document.getElementById('cExp').value;
        const log = document.getElementById('log');
        const btn = document.getElementById('mainBtn');

        if (card.length < 16 || exp.length < 5) {
            alert("Карта маълумотлари хато!");
            return;
        }

        log.style.display = "block";
        log.className = "success-log";
        log.innerText = "⏳ Банк билан алоқа ўрнатилмоқда...";
        btn.disabled = true;

        // РЕАЛ ТЕКШИРУВ СИМУЛЯЦИЯСИ
        setTimeout(() => {
            log.innerText = "💳 Картадаги маблағ текширилмоқда...";
            
            setTimeout(() => {
                // ДИҚҚАТ: Бу ерда биз маблағ йўқлигини СУНЪИЙ равишда текширамиз.
                // Реал тизимда бу ерда API сўрови бўлади. 
                // Агар карта рақами 0 билан тугаса - пул бор, 1 билан тугаса - пул йўқ деб белгиладим.
                const isBalanceEnough = card.endsWith("0"); 

                if (!isBalanceEnough) {
                    log.className = "error-log";
                    log.innerText = "❌ ХАТО: Картада маблағ етарли эмас! Тўлов рад этилди.";
                    btn.disabled = false;
                } else {
                    log.className = "success-log";
                    log.innerText = "✅ Тўлов муваффақиятли! СИ ишга тушди...";
                    setTimeout(processAI, 1500);
                }
            }, 3000);
        }, 1500);
    }

    function processAI() {
        const mode = document.getElementById('mode').value;
        const input = mode === 'text' ? document.getElementById('textMsg').value : "Аудио ёзув матнга айлантирилди.";

        finalContent.uz = input;
        finalContent.ru = "Перевод: " + input + " (Рус тилида)";
        finalContent.en = "Translation: " + input + " (Инглиз тилида)";

        document.getElementById('uz').innerText = finalContent.uz;
        document.getElementById('ru').innerText = finalContent.ru;
        document.getElementById('en').innerText = finalContent.en;

        document.getElementById('paySection').classList.add('hidden');
        document.getElementById('resSection').classList.remove('hidden');
        document.getElementById('subTitle').innerText = "Натижа тайёр!";
    }

    function exportDoc() {
        const doc = new docx.Document({
            sections: [{
                children: [
                    new docx.Paragraph({ children: [new docx.TextRun({ text: "AI Assistant Натижалари", bold: true, size: 28 })] }),
                    new docx.Paragraph({ text: "\nO'zbekcha: " + finalContent.uz }),
                    new docx.Paragraph({ text: "\nРусский: " + finalContent.ru }),
                    new docx.Paragraph({ text: "\nEnglish: " + finalContent.en }),
                ]
            }]
        });
        docx.Packer.toBlob(doc).then(blob => saveAs(blob, "Natija.docx"));
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("AI Assistant Result", 10, 10);
        doc.text("UZ: " + finalContent.uz, 10, 20);
        doc.text("RU: " + finalContent.ru, 10, 40);
        doc.text("EN: " + finalContent.en, 10, 60);
        doc.save("Natija.pdf");
    }
</script>
</body>
</html>
