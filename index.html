<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretService - Кўп файл юклаш</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #4e54c8; --accent: #00f2fe; --dark: #0f0c29; --glass: rgba(255, 255, 255, 0.1); --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        nav { background: rgba(0,0,0,0.8); padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid var(--accent); }
        nav a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 8px; }
        .section { display: none; padding: 20px; max-width: 700px; margin: auto; }
        .section.active { display: block; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .loader { display: none; color: var(--accent); margin: 10px 0; font-weight: bold; }
        #idList { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; font-family: monospace; display: none; border: 1px dashed var(--gold); }
        .id-item { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('vault')">🛡 Кўп файл юклаш</a>
    <a onclick="showSection('download')">📥 Олиш</a>
</nav>

<div id="vault" class="section active">
    <div class="card">
        <h2>🛡 Файлларни Сейфга қўйиш</h2>
        <p style="font-size: 12px;">(Бир нечта файлни танлашингиз мумкин)</p>
        <input type="password" id="vaultPass" placeholder="Шифрлаш пароли (барча файллар учун бир хил)">
        <!-- "multiple" қўшилди -->
        <input type="file" id="fileInput" multiple> 
        <button onclick="encryptAndUploadAll()">Ҳаммасини базага юбориш</button>
        
        <div id="upLoader" class="loader">Файллар шифрланмоқда... <span>0</span>%</div>
        
        <div id="idList">
            <b style="color: var(--gold);">Юкланган файллар ID лари:</b><br><br>
            <div id="idItems"></div>
            <p style="font-size: 11px; color: #ccc; margin-top: 10px;">* Бу IDларни сақлаб олинг, файлни қайтариб олиш учун керак бўлади.</p>
        </div>
    </div>
</div>

<div id="download" class="section">
    <div class="card">
        <h2>📥 Файлни қайтариб олиш</h2>
        <input type="text" id="accessCodeInput" placeholder="Тўлов коди (11542)">
        <input type="text" id="fileIdInput" placeholder="Файл ID рақами">
        <input type="password" id="decryptPass" placeholder="Файл пароли">
        <button onclick="downloadAndDecrypt()" style="background: #28a745;">Юклаб олиш</button>
        <div id="downLoader" class="loader">Файл қидирилмоқда...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDFkBXMPLV1wCpuO9ITTAkgnJJx_TOE6jo",
        authDomain: "secretservice-d3487.firebaseapp.com",
        databaseURL: "https://secretservice-d3487-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "secretservice-d3487",
        storageBucket: "secretservice-d3487.firebasestorage.app",
        messagingSenderId: "175804281554",
        appId: "1:175804281554:web:56ff1755da0defb9ce730b"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const AUTO_CODE = "11542";

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function encryptAndUploadAll() {
        const pass = document.getElementById('vaultPass').value;
        const files = document.getElementById('fileInput').files;
        const idListDiv = document.getElementById('idList');
        const idItems = document.getElementById('idItems');
        const loader = document.getElementById('upLoader');

        if(!pass || files.length === 0) return alert("Паролни ёзинг ва файлларни танланг!");

        loader.style.display = "block";
        idItems.innerHTML = "";
        idListDiv.style.display = "none";

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            loader.querySelector('span').innerText = Math.round(((i+1)/files.length)*100);

            await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const encrypted = CryptoJS.AES.encrypt(e.target.result, pass).toString();
                    const newRef = database.ref('vault_files').push();
                    await newRef.set({
                        name: file.name,
                        data: encrypted,
                        type: file.type
                    });
                    
                    idItems.innerHTML += `<div class="id-item">📄 <b>${file.name}</b><br>ID: <span style="color:var(--accent)">${newRef.key}</span></div>`;
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }

        loader.style.display = "none";
        idListDiv.style.display = "block";
        alert("Ҳамма файллар муваффақиятли юкланди!");
    }

    async function downloadAndDecrypt() {
        const code = document.getElementById('accessCodeInput').value;
        const id = document.getElementById('fileIdInput').value;
        const pass = document.getElementById('decryptPass').value;

        if(code !== AUTO_CODE) return alert("Код хато!");
        if(!id || !pass) return alert("ID ва паролни киритинг!");

        document.getElementById('downLoader').style.display = "block";
        
        database.ref('vault_files/' + id).once('value').then(snap => {
            const val = snap.val();
            document.getElementById('downLoader').style.display = "none";
            
            if(!val) return alert("Файл топилмади!");

            try {
                const bytes = CryptoJS.AES.decrypt(val.data, pass);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                
                if(!original) throw new Error();

                const link = document.createElement('a');
                link.href = original;
                link.download = val.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch(e) {
                alert("Парол нотўғри!");
            }
        });
    }
</script>
</body>
</html>
